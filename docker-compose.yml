services:
  # ─── Infrastructure ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sevagan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sevagan
      POSTGRES_PASSWORD: sevagan_pass
      POSTGRES_DB: sevagan
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sevagan -d sevagan']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sevagan-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: sevagan-minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: sevagan
      MINIO_ROOT_PASSWORD: sevagan_minio_pass
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 30s
      timeout: 20s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    container_name: sevagan-ollama
    restart: unless-stopped
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama

  # ─── Application ───────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: sevagan-api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      API_PORT: 3001
      DATABASE_URL: postgresql://sevagan:sevagan_pass@postgres:5432/sevagan
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      WA_PHONE_NUMBER_ID: ${WA_PHONE_NUMBER_ID:-}
      WA_ACCESS_TOKEN: ${WA_ACCESS_TOKEN:-}
      WA_APP_SECRET: ${WA_APP_SECRET:-}
      WA_WEBHOOK_VERIFY_TOKEN: ${WA_WEBHOOK_VERIFY_TOKEN:-dev-verify-token}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: 'false'
      MINIO_ACCESS_KEY: sevagan
      MINIO_SECRET_KEY: sevagan_minio_pass
      MINIO_BUCKET_NAME: sevagan-uploads
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - '3001:3001'
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run start:dev

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: sevagan-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-nextauth-secret}
      NEXTAUTH_URL: http://localhost:3000
    ports:
      - '3000:3000'
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - api
    command: npm run dev

  nginx:
    image: nginx:alpine
    container_name: sevagan-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/letsencrypt
    depends_on:
      - api
      - web

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ollama_data:
  nginx_certs:

networks:
  default:
    name: sevagan-network

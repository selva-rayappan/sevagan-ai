services:
  postgres:
    image: postgres:16.4-alpine
    container_name: sevagan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sevagan
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: sevagan
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sevagan -d sevagan']
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  redis:
    image: redis:7.4-alpine
    container_name: sevagan-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: sevagan-minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 30s
      timeout: 20s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  ollama:
    image: ollama/ollama:0.6.5
    container_name: sevagan-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: sevagan-api:${IMAGE_TAG:-latest}
    container_name: sevagan-api
    restart: unless-stopped
    env_file:
      - /etc/sevagan/.env
    environment:
      NODE_ENV: production
      API_PORT: 3001
      DATABASE_URL: postgresql://sevagan:${POSTGRES_PASSWORD}@postgres:5432/sevagan
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: 'false'
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_NAME: sevagan-uploads
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:3001/api/v1/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    container_name: sevagan-seed
    env_file:
      - /etc/sevagan/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://sevagan:${POSTGRES_PASSWORD}@postgres:5432/sevagan
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run prisma:seed
    profiles: ['seed']

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        # NEXT_PUBLIC_API_URL is inlined into the client bundle at build time.
        # Changing PUBLIC_API_URL in /etc/sevagan/.env requires rebuilding this
        # image (a plain restart won't pick it up) — deploy.sh always rebuilds.
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL}
    image: sevagan-web:${IMAGE_TAG:-latest}
    container_name: sevagan-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      - api
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  certbot:
    image: certbot/certbot:v3.1.0
    container_name: sevagan-certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: ['certbot']
    profiles: ['ssl']

  nginx:
    image: nginx:1.27-alpine
    container_name: sevagan-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infrastructure/nginx/nginx.conf.generated:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot
    depends_on:
      - api
      - web
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ollama_data:
  certbot_webroot:

networks:
  default:
    name: sevagan-network
